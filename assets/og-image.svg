<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="og-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1115"/>
      <stop offset="50%" stop-color="#171a21"/>
      <stop offset="100%" stop-color="#0f1115"/>
    </linearGradient>
    <linearGradient id="og-badge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5865F2"/>
      <stop offset="100%" stop-color="#3a44a3"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="white" opacity="0.04"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#og-bg)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Glow blob -->
  <circle cx="950" cy="120" r="280" fill="#5865F2" opacity="0.12"/>
  <circle cx="200" cy="540" r="220" fill="#7fffb4" opacity="0.06"/>

  <!-- Badge top-left -->
  <g transform="translate(80, 80)">
    <rect width="100" height="100" rx="22" fill="#0f1115"/>
    <rect x="10" y="10" width="80" height="80" rx="16" fill="url(#og-badge)"/>
    <text x="50" y="64" fill="white" font-family="ui-sans-serif, system-ui, sans-serif" font-weight="900" font-size="34" text-anchor="middle" letter-spacing="-1.5">26B</text>
    <circle cx="34" cy="80" r="3" fill="#7fffb4"/>
    <circle cx="50" cy="80" r="3" fill="white" opacity="0.9"/>
    <circle cx="66" cy="80" r="3" fill="#fcb045"/>
  </g>

  <!-- Wordmark -->
  <text x="200" y="120" fill="#a3a8b3" font-family="ui-monospace, 'SF Mono', monospace" font-size="18" letter-spacing="4">EQUINIM COLLEGE · INTAKE 26.B</text>
  <text x="200" y="170" fill="white" font-family="ui-sans-serif, system-ui, sans-serif" font-weight="800" font-size="44" letter-spacing="-1">Class Hub</text>

  <!-- Main headline -->
  <text x="80" y="340" fill="white" font-family="ui-sans-serif, system-ui, sans-serif" font-weight="900" font-size="84" letter-spacing="-3">Front-End</text>
  <text x="80" y="430" fill="white" font-family="ui-sans-serif, system-ui, sans-serif" font-weight="900" font-size="84" letter-spacing="-3">Web Dev <tspan fill="#5865F2">Resources</tspan></text>

  <!-- Tags row -->
  <g transform="translate(80, 490)">
    <rect width="160" height="40" rx="20" fill="rgba(88,101,242,0.18)" stroke="#5865F2" stroke-width="1"/>
    <text x="80" y="26" fill="#a8b1ff" font-family="ui-sans-serif, sans-serif" font-weight="600" font-size="14" text-anchor="middle" letter-spacing="1">12 WEEKS · 24 CLASSES</text>

    <rect x="180" width="140" height="40" rx="20" fill="rgba(127,255,180,0.12)" stroke="#7fffb4" stroke-width="1"/>
    <text x="250" y="26" fill="#7fffb4" font-family="ui-sans-serif, sans-serif" font-weight="600" font-size="14" text-anchor="middle" letter-spacing="1">LESSONS · DOWNLOADS</text>

    <rect x="340" width="120" height="40" rx="20" fill="rgba(252,176,69,0.12)" stroke="#fcb045" stroke-width="1"/>
    <text x="400" y="26" fill="#fcb045" font-family="ui-sans-serif, sans-serif" font-weight="600" font-size="14" text-anchor="middle" letter-spacing="1">RESOURCES</text>
  </g>

  <!-- Footer -->
  <text x="80" y="585" fill="#6b7280" font-family="ui-monospace, monospace" font-size="14" letter-spacing="2">CLASSHUB.26B · EQC PERTH WA</text>
</svg>
