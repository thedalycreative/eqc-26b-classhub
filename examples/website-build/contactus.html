<style>
  /* Hub floating nav — fits any page theme, fixed top-left */
  .hub-floatnav {
    position: fixed; top: 14px; left: 14px; z-index: 9999;
    display: inline-flex; align-items: center; gap: 4px;
    padding: 5px 5px 5px 5px;
    background: rgba(30,31,34,0.92); color: #e3e5e8;
    border: 1px solid rgba(184,239,225,0.25);
    border-radius: 999px;
    font: 600 12px/1 'Segoe UI', system-ui, sans-serif;
    box-shadow: 0 6px 20px rgba(0,0,0,0.3);
    backdrop-filter: saturate(150%) blur(8px);
    -webkit-backdrop-filter: saturate(150%) blur(8px);
  }
  .hub-floatnav__brand {
    display: inline-flex; align-items: center; justify-content: center;
    width: 28px; height: 28px; border-radius: 50%;
    background: #5865f2; overflow: hidden;
    margin-right: 4px;
  }
  .hub-floatnav__brand img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .hub-floatnav a.hub-floatnav__link {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 6px 10px; border-radius: 999px;
    color: #e3e5e8 !important; text-decoration: none !important;
    transition: background .15s, color .15s;
    letter-spacing: 0.2px;
  }
  .hub-floatnav a.hub-floatnav__link:hover {
    background: rgba(88,101,242,0.35);
    color: #fff !important;
  }
  .hub-floatnav a.hub-floatnav__link.is-current {
    background: rgba(88,101,242,0.55);
    color: #fff !important;
  }
  .hub-floatnav i { font-size: 13px; opacity: 0.95; }
  @media (max-width: 640px) {
    .hub-floatnav a.hub-floatnav__link span { display: none; }
    .hub-floatnav a.hub-floatnav__link { padding: 6px 8px; }
  }
  @media print { .hub-floatnav { display: none; } }
</style>
</head>
<body>
<nav class="hub-floatnav" aria-label="Class Hub navigation">

  <a href="../../downloads.html"   class="hub-floatnav__link"><i class="bi bi-download"></i><span>Downloads</span></a>
</nav>
    <div class="container">
        <div class="contact-form">
            <h2 class="text-center">Contact Us</h2>
            <form>
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" class="form-control" id="name" placeholder="Your Name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" class="form-control" id="email" placeholder="Your Email" required>
                </div>
                <div class="form-group">
                    <label for="phone">Phone</label>
                    <input type="tel" class="form-control" id="phone" placeholder="Your Phone Number" required>
                </div>
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea class="form-control" id="message" rows="5" placeholder="Your Message" required></textarea>
                </div>
                <button type="submit" class="btn btn-primary btn-block">Submit</button>
            </form>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
